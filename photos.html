  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .page-hero {
      padding: 6rem 2rem 3rem;
      max-width: var(--max-w);
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .page-hero .section-label { margin-bottom: 0.75rem; }
    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 0.9;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    /* Masonry-ish photo grid */
    .photo-grid {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      columns: 3;
      column-gap: 1rem;
    }
    .photo-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      background: var(--bg3);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
      filter: grayscale(20%);
    }
    .photo-item:hover img { transform: scale(1.03); filter: grayscale(0%); }

    @media (max-width: 768px) {
      .photo-grid { columns: 2; }
    }
    @media (max-width: 480px) {
      .photo-grid { columns: 1; }
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<main>
  <div class="page-hero">
    <span class="section-label">photos</span>
    <h1>Photos.</h1>
  </div>


  <div class="photo-grid">
    <div class="photo-item">
      <img src="/assets/img/photos/photo-01.jpg" alt="Photo 01" loading="lazy">
    </div>
    <div class="photo-item">

    </div>

    </div>
    <div class="photo-item">
      <img src="/assets/img/photos/photo-07.jpg" alt="Photo 07" loading="lazy">
    </div>
    <div class="photo-item">

    </div>
    <div class="photo-item">
      <img src="/assets/img/photos/photo-09.jpg" alt="Photo 09" loading="lazy">
    </div>
  </div>
</main>

<div id="footer-placeholder"></div>
<script src="/assets/js/includes.js"></script>
